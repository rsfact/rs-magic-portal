services:
  postgres:
    image: postgres:17
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USR}
      POSTGRES_PASSWORD: ${PG_PW}
      POSTGRES_INITDB_ARGS: "--auth=scram-sha-256"
      TZ: UTC
    ports:
      - 127.0.0.1:${PG_PORT}:5432
    command: >
      postgres
        -c timezone=UTC
        -c lc_messages=en_US.utf8
        -c password_encryption=scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USR} -d ${PG_DB}"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 10s
  adminer:
    image: adminer
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 127.0.0.1:${ADMINER_PORT}:8080
    environment:
      ADMINER_DEFAULT_SERVER: postgres
