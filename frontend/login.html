<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ログイン</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    </head>
    <body class="bg-[var(--color-bg,#FAFAFA)] text-[var(--color-black,#333)] min-h-screen">
        <div class="min-h-screen flex items-center justify-center p-4">
            <div class="w-full max-w-md bg-white rounded-lg p-4 border border-gray-200">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-right-to-bracket text-[var(--color-primary,#799BF9)] text-lg"></i>
                    <h1 class="text-lg font-semibold leading-tight">マジックポータル&trade;にようこそ</h1>
                </div>
                <form id="login-form" class="space-y-3">
                    <div>
                        <label for="email" class="block text-sm font-medium mb-1">メールアドレス</label>
                        <input id="email" name="email" type="email" autocomplete="username" required class="w-full rounded-md border border-gray-300 p-2 outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-primary,#799BF9)]" />
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium mb-1">パスワード</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required class="w-full rounded-md border border-gray-300 p-2 outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-primary,#799BF9)]" />
                    </div>
                    <button id="signin-button" type="submit" disabled class="w-full rounded-md bg-[var(--color-primary,#799BF9)] text-white py-2 cursor-pointer hover:opacity-90 transition disabled:opacity-50 disabled:cursor-not-allowed">
                        サインイン
                    </button>
                </form>
                <div id="status" class="mt-3 text-sm text-[var(--color-danger,#FF5151)] min-h-[1.25rem]"></div>
                <p class="mt-3 text-xs text-gray-500 leading-relaxed">
                    入力が完了すると、ポータルへ遷移します。
                </p>
            </div>
        </div>
        <script type="module" src="./login.js"></script>
    </body>
</html>
