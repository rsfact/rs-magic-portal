<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Portal</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    </head>
    <body class="bg-[var(--color-bg,#FAFAFA)] text-[var(--color-black,#333)] min-h-screen">
        <div class="min-h-screen p-4">
            <div class="max-w-3xl mx-auto">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-grid-2 text-[var(--color-primary,#799BF9)] text-lg"></i>
                        <h1 class="text-lg font-semibold leading-tight">ポータル</h1>
                    </div>
                    <div id="status" class="text-sm text-gray-500"></div>
                </div>

                <div id="cards" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>

        <div id="nfc-modal" class="hidden fixed inset-0 bg-black/40 items-center justify-center p-4">
            <div class="w-full max-w-md bg-white rounded-lg border border-gray-200 p-4">
                <div class="flex items-center gap-2 mb-3">
                    <i class="fa-solid fa-fingerprint text-[var(--color-accent,#FFA775)] text-lg"></i>
                    <h2 class="text-base font-semibold leading-tight">NFC</h2>
                </div>
                <p id="nfc-message" class="text-sm text-gray-700 leading-relaxed mb-4">カードをタッチしてください</p>
                <button id="nfc-close" type="button" class="w-full rounded-md bg-gray-900 text-white py-2 cursor-pointer hover:opacity-90 transition focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-gray-900">キャンセル</button>
            </div>
        </div>

        <script type="module" src="./portal.js"></script>
    </body>
</html>
