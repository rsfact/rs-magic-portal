<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
        <title>アプリ管理</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
        <style>
            :root {
                --color-bg: #fafafa;
                --color-black: #333;
                --color-primary: #799bf9;
                --color-accent: #ffa775;
                --color-danger: #ff5151;
            }
        </style>
    </head>
    <body class="bg-[var(--color-bg)] text-[var(--color-black)] min-h-screen">
        <div class="min-h-screen p-4 md:p-6 max-w-4xl mx-auto">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-pen-to-square text-[var(--color-primary)] text-lg"></i>
                    <h1 class="text-xl font-semibold leading-tight">アプリ管理</h1>
                </div>
                <div class="flex flex-wrap gap-2">
                    <a
                        href="./index.html"
                        class="rounded-md border border-gray-200 bg-white px-3 py-2 text-sm hover:bg-gray-50 transition focus-visible:ring-2 focus-visible:ring-[var(--color-primary)]"
                        >ホームへ</a
                    >
                </div>
            </div>

            <p id="gate-msg" class="hidden text-sm text-[var(--color-danger)] mb-4"></p>

            <div id="editor" class="hidden space-y-8">
                <section class="bg-white rounded-lg border border-gray-200 p-4">
                    <h2 id="form-title" class="text-base font-semibold mb-3">新規アプリ</h2>
                    <form id="app-form" class="space-y-3">
                        <input type="hidden" id="edit-id" value="" />
                        <div>
                            <label for="f-name" class="block text-sm font-medium mb-1">名前</label>
                            <input
                                id="f-name"
                                required
                                minlength="1"
                                class="w-full rounded-md border border-gray-300 p-2 outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-primary)]"
                            />
                        </div>
                        <div>
                            <label for="f-desc" class="block text-sm font-medium mb-1">説明</label>
                            <input
                                id="f-desc"
                                required
                                class="w-full rounded-md border border-gray-300 p-2 outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-primary)]"
                            />
                        </div>
                        <div>
                            <label for="f-icon" class="block text-sm font-medium mb-1">Font Awesome クラス（任意）</label>
                            <input
                                id="f-icon"
                                placeholder="fa-solid fa-wand-magic-sparkles"
                                class="w-full rounded-md border border-gray-300 p-2 outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-primary)]"
                            />
                        </div>
                        <div>
                            <label for="f-url" class="block text-sm font-medium mb-1">URL</label>
                            <input
                                id="f-url"
                                type="text"
                                required
                                minlength="1"
                                class="w-full rounded-md border border-gray-300 p-2 outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-primary)]"
                            />
                        </div>
                        <div id="f-position-wrap" class="hidden">
                            <label for="f-position" class="block text-sm font-medium mb-1">表示順（更新時のみ）</label>
                            <input
                                id="f-position"
                                type="number"
                                min="1"
                                class="w-full rounded-md border border-gray-300 p-2 outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-primary)]"
                            />
                        </div>
                        <div class="flex flex-wrap gap-2 pt-2">
                            <button
                                id="submit-btn"
                                type="submit"
                                class="rounded-md bg-[var(--color-primary)] text-white px-4 py-2 text-sm cursor-pointer hover:opacity-90 transition focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-[var(--color-primary)]"
                            >
                                保存
                            </button>
                            <button
                                id="cancel-edit"
                                type="button"
                                class="hidden rounded-md border border-gray-300 bg-white px-4 py-2 text-sm cursor-pointer hover:bg-gray-50 transition focus-visible:ring-2 focus-visible:ring-[var(--color-primary)]"
                            >
                                新規に切り替え
                            </button>
                        </div>
                    </form>
                    <div id="form-status" class="mt-2 text-sm min-h-[1.25rem]"></div>
                </section>

                <section class="bg-white rounded-lg border border-gray-200 p-4 overflow-x-auto">
                    <h2 class="text-base font-semibold mb-3">一覧</h2>
                    <table class="w-full text-sm text-left">
                        <thead>
                            <tr class="border-b border-gray-200 text-gray-500">
                                <th class="py-2 pr-2 font-medium">順</th>
                                <th class="py-2 pr-2 font-medium">名前</th>
                                <th class="py-2 pr-2 font-medium hidden sm:table-cell">URL</th>
                                <th class="py-2 font-medium w-32">操作</th>
                            </tr>
                        </thead>
                        <tbody id="app-rows"></tbody>
                    </table>
                    <p id="list-empty" class="text-sm text-gray-500 py-4 hidden">アプリはまだありません。</p>
                </section>
            </div>
        </div>
        <script type="module" src="./apps-edit.js"></script>
    </body>
</html>
