<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="./favicon.ico" type="image/svg+xml" />
        <title>ログイン</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
        <link rel="stylesheet" href="./style.css" />
        <script type="module" src="./login.js"></script>
    </head>
    <body class="min-h-screen">
        <div class="min-h-screen flex items-center justify-center p-4">
            <div class="card w-full max-w-sm rounded-2xl p-8 animate-fade-up">
                <div class="flex flex-col items-center mb-8">
                    <img src="./logo.png" alt="" class="w-16 h-16 mb-4" />
                    <h1 class="text-lg font-semibold tracking-tight">マジックポータル&trade;</h1>
                </div>
                <form id="login-form" class="space-y-4">
                    <div>
                        <label for="email" class="block text-xs font-medium text-slate-400 mb-1.5">メールアドレス</label>
                        <input
                            id="email"
                            name="email"
                            type="email"
                            autocomplete="username"
                            required
                            class="w-full rounded-lg border border-slate-200 bg-white/80 p-3 text-sm outline-none focus:border-[var(--color-primary)] focus:ring-2 focus:ring-[var(--color-primary)]/20 transition-all"
                        />
                    </div>
                    <div>
                        <label for="password" class="block text-xs font-medium text-slate-400 mb-1.5">パスワード</label>
                        <input
                            id="password"
                            name="password"
                            type="password"
                            autocomplete="current-password"
                            required
                            class="w-full rounded-lg border border-slate-200 bg-white/80 p-3 text-sm outline-none focus:border-[var(--color-primary)] focus:ring-2 focus:ring-[var(--color-primary)]/20 transition-all"
                        />
                    </div>
                    <button
                        id="signin-button"
                        type="submit"
                        disabled
                        class="btn-primary w-full rounded-lg py-3 text-sm font-medium focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-[var(--color-primary)]"
                    >
                        サインイン
                    </button>
                </form>
                <div id="status" class="mt-4 text-sm text-[var(--color-danger)] min-h-[1.25rem] text-center"></div>
            </div>
        </div>
    </body>
</html>
